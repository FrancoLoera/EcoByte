<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Visualiza el catálogo de servicios de EcoByte en línea.">
    <title>EcoByte | Catálogo de Servicios</title>
    <link rel="icon" href="assets/img/EcoByte Favicon.png">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
      .catalog-page {
        min-height: 100vh;
        padding-top: 120px;
        padding-bottom: 48px;
      }

      .catalog-shell {
        border-radius: 18px;
        overflow: hidden;
        box-shadow: var(--eco-shadow);
        border: 1px solid rgba(15, 107, 69, 0.14);
        background: #fff;
      }

      .catalog-frame {
        width: 100%;
        height: min(78vh, 920px);
        border: 0;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top eco-navbar" aria-label="Navegación principal">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html#inicio" aria-label="Ir al inicio">
          <img src="assets/img/EcoByte Horizontal Logo.png" width="200" alt="EcoByte">
        </a>
        <div class="ms-auto">
          <a class="btn btn-outline-eco" href="index.html#servicios">Volver al sitio</a>
        </div>
      </div>
    </nav>

    <main class="catalog-page">
      <section class="container">
        <div class="section-heading mb-4">
          <span class="section-kicker">Catálogo</span>
          <h1 class="section-title">Catálogo de Servicios EcoByte</h1>
          <p>Consulta el catálogo directamente desde esta página.</p>
        </div>
        <div class="catalog-shell">
          <iframe
            class="catalog-frame"
            src="assets/docs/EcoByte%20-%20Cat%C3%A1logo%20de%20productos-1.pdf"
            title="Catálogo de servicios EcoByte"
          ></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
